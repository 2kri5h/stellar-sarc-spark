/* ===================== HERO — Three.js Solar System ===================== */

function Hero({ onPickPortfolio }) {
  const mountRef = useRef(null);

  useEffect(() => {
    const THREE = window.THREE;
    const mount = mountRef.current;
    const W = () => mount.clientWidth;
    const H = () => mount.clientHeight;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, W() / H(), 0.1, 2000);
    camera.position.set(0, 9, 28);
    camera.lookAt(0, 0, 0);

    // tilt the whole orbital system for depth
    const system = new THREE.Group();
    system.rotation.x = 0.35;
    system.rotation.z = -0.08;
    scene.add(system);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(W(), H());
    renderer.setClearColor(0x000000, 0);
    mount.appendChild(renderer.domElement);

    // label overlay (DOM)
    const labelLayer = document.createElement('div');
    labelLayer.style.cssText = "position:absolute;inset:0;pointer-events:none;overflow:hidden;";
    mount.appendChild(labelLayer);

    // starfield — two layers, parallax
    function makeStars(count, rMin, rMax, color, size, opacity) {
      const g = new THREE.BufferGeometry();
      const pos = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const r = rMin + Math.random() * (rMax - rMin);
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
        pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        pos[i*3+2] = r * Math.cos(phi);
      }
      g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      return new THREE.Points(g, new THREE.PointsMaterial({ color, size, transparent: true, opacity, depthWrite: false }));
    }
    const starsFar  = makeStars(1400, 250, 600, 0xbfd0ff, 0.6, 0.55);
    const starsNear = makeStars(400, 80, 180, 0xfff0c8, 1.1, 0.85);
    scene.add(starsFar); scene.add(starsNear);

    // soft nebula sprites (colored fog)
    function nebula(color, scale, x, y, z) {
      const c = document.createElement('canvas'); c.width = c.height = 256;
      const cx = c.getContext('2d');
      const g = cx.createRadialGradient(128,128,0,128,128,128);
      g.addColorStop(0, color + '88'); g.addColorStop(0.5, color + '22'); g.addColorStop(1, color + '00');
      cx.fillStyle = g; cx.fillRect(0,0,256,256);
      const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
      s.scale.set(scale, scale, 1); s.position.set(x, y, z); return s;
    }
    scene.add(nebula('#5b7cff', 60, -40, 10, -80));
    scene.add(nebula('#ff8a5b', 50,  50, -8, -90));
    scene.add(nebula('#a16bff', 45,   0, 30, -120));

    // SUN
    const sunGroup = new THREE.Group();
    const sun = new THREE.Mesh(
      new THREE.SphereGeometry(1.8, 64, 64),
      new THREE.MeshBasicMaterial({ color: 0xffd98a })
    );
    sunGroup.add(sun);

    // glow sprite
    const glowCanvas = document.createElement('canvas');
    glowCanvas.width = glowCanvas.height = 256;
    const gctx = glowCanvas.getContext('2d');
    const grad = gctx.createRadialGradient(128,128,10,128,128,128);
    grad.addColorStop(0, 'rgba(255,220,150,0.9)');
    grad.addColorStop(0.3, 'rgba(255,180,90,0.45)');
    grad.addColorStop(1, 'rgba(255,180,90,0)');
    gctx.fillStyle = grad; gctx.fillRect(0,0,256,256);
    const glowTex = new THREE.CanvasTexture(glowCanvas);
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
    glow.scale.set(9, 9, 1);
    sunGroup.add(glow);
    system.add(sunGroup);

    // SUN label "SARC"
    const sunLabel = document.createElement('div');
    sunLabel.textContent = "SARC";
    sunLabel.style.cssText = "position:absolute;font-family:'Fraunces',serif;font-weight:600;font-size:clamp(28px,4vw,52px);color:#0a0f24;letter-spacing:.04em;transform:translate(-50%,-50%);text-shadow:0 0 18px rgba(255,220,150,0.6);";
    labelLayer.appendChild(sunLabel);

    // Orbital rings (visual) - dashed feel via low opacity
    function makeRing(radius, color, opacity) {
      const pts = [];
      const seg = 192;
      for (let i = 0; i <= seg; i++) {
        const a = (i/seg) * Math.PI * 2;
        pts.push(new THREE.Vector3(Math.cos(a)*radius, 0, Math.sin(a)*radius));
      }
      const g = new THREE.BufferGeometry().setFromPoints(pts);
      return new THREE.Line(g, new THREE.LineBasicMaterial({ color, transparent: true, opacity }));
    }
    const R_START = 5.0;
    const R_STEP = 1.6;
    for (let i = 0; i < 8; i++) {
      const r = R_START + i * R_STEP;
      const color = i % 2 === 0 ? 0x5b7cff : 0xffb066;
      const opacity = 0.35 - i * 0.025;
      system.add(makeRing(r, color, opacity));
    }

    // Asteroid dust belt between rings
    const beltGeo = new THREE.BufferGeometry();
    const beltN = 600;
    const beltPos = new Float32Array(beltN * 3);
    for (let i = 0; i < beltN; i++) {
      const r = 10.5 + (Math.random() - 0.5) * 2.0;
      const a = Math.random() * Math.PI * 2;
      beltPos[i*3]   = Math.cos(a) * r;
      beltPos[i*3+1] = (Math.random() - 0.5) * 0.4;
      beltPos[i*3+2] = Math.sin(a) * r;
    }
    beltGeo.setAttribute('position', new THREE.BufferAttribute(beltPos, 3));
    const belt = new THREE.Points(beltGeo, new THREE.PointsMaterial({ color: 0xffcd8a, size: 0.08, transparent: true, opacity: 0.6 }));
    system.add(belt);

    // planets
    const planetMeshes = [];
    PORTFOLIOS.forEach((p, idx) => {
      const radius = R_START + idx * R_STEP;
      const size = 0.42 + idx * 0.04;
      const color = new THREE.Color(p.color);
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(size, 32, 32),
        new THREE.MeshStandardMaterial({ color, emissive: color.clone().multiplyScalar(0.35), roughness: 0.55, metalness: 0.25 })
      );
      // Give every other planet a Saturn-style ring
      if (idx % 2 === 0) {
        const ring = new THREE.Mesh(
          new THREE.RingGeometry(size * 1.4, size * 2.1, 48),
          new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.35 })
        );
        ring.rotation.x = Math.PI / 2.4;
        mesh.add(ring);
      }
      const speed = 0.5 / Math.sqrt(radius);
      const phase = (idx * (360 / 8) * Math.PI) / 180;
      mesh.userData = { radius, speed, phase, portfolio: p, baseScale: 1, targetScale: 1 };
      system.add(mesh);
      planetMeshes.push(mesh);

      const label = document.createElement('div');
      label.className = "planet-label";
      label.textContent = p.name;
      label.style.position = "absolute";
      labelLayer.appendChild(label);
      mesh.userData.label = label;
    });

    // lights
    scene.add(new THREE.AmbientLight(0x8090c0, 0.55));
    const pl = new THREE.PointLight(0xffd98a, 2.6, 100);
    pl.position.set(0,0,0);
    system.add(pl);
    const rim = new THREE.DirectionalLight(0x5b7cff, 0.4);
    rim.position.set(-10, 8, -6);
    scene.add(rim);

    // raycaster
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(-10,-10);
    let hovered = null;

    function onMove(e) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    }
    function onClick() {
      if (hovered) {
        onPickPortfolio(hovered.userData.portfolio);
      }
    }
    renderer.domElement.addEventListener('pointermove', onMove);
    renderer.domElement.addEventListener('click', onClick);

    function projectToScreen(vec3) {
      const v = vec3.clone().project(camera);
      return {
        x: (v.x * 0.5 + 0.5) * W(),
        y: (-v.y * 0.5 + 0.5) * H(),
      };
    }

    let raf, t0 = performance.now();
    function loop() {
      const t = (performance.now() - t0) / 1000;

      sunGroup.rotation.y = t * 0.1;
      const pulse = 1 + Math.sin(t * 1.4) * 0.03;
      sun.scale.setScalar(pulse);

      belt.rotation.y = t * 0.04;

      const tmp = new THREE.Vector3();
      planetMeshes.forEach(m => {
        const { radius, speed, phase } = m.userData;
        m.position.x = Math.cos(phase + t * speed) * radius;
        m.position.z = Math.sin(phase + t * speed) * radius;
        m.position.y = Math.sin(t * 0.3 + phase) * 0.25;
        m.rotation.y += 0.01;

        m.userData.baseScale += (m.userData.targetScale - m.userData.baseScale) * 0.12;
        m.scale.setScalar(m.userData.baseScale);

        // label uses WORLD position (system is tilted)
        const currentSize = 0.42 + planetMeshes.indexOf(m) * 0.04;
        m.getWorldPosition(tmp); tmp.y += currentSize * m.userData.baseScale + 0.35;
        const sp = projectToScreen(tmp);
        m.userData.label.style.left = sp.x + 'px';
        m.userData.label.style.top  = sp.y + 'px';
      });

      // sun label
      sunGroup.getWorldPosition(tmp);
      const sunSp = projectToScreen(tmp);
      sunLabel.style.left = sunSp.x + 'px';
      sunLabel.style.top  = sunSp.y + 'px';

      starsFar.rotation.y  = t * 0.004;
      starsNear.rotation.y = t * 0.012;

      // hover detection
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(planetMeshes, false);
      if (hits.length) {
        const m = hits[0].object;
        if (hovered && hovered !== m) hovered.userData.targetScale = 1;
        hovered = m;
        hovered.userData.targetScale = 1.4;
        renderer.domElement.style.cursor = 'pointer';
      } else {
        if (hovered) hovered.userData.targetScale = 1;
        hovered = null;
        renderer.domElement.style.cursor = 'default';
      }

      renderer.render(scene, camera);
      raf = requestAnimationFrame(loop);
    }
    loop();

    function onResize() {
      camera.aspect = W() / H();
      camera.updateProjectionMatrix();
      renderer.setSize(W(), H());
    }
    window.addEventListener('resize', onResize);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', onResize);
      renderer.domElement.removeEventListener('pointermove', onMove);
      renderer.domElement.removeEventListener('click', onClick);
      renderer.dispose();
      mount.removeChild(renderer.domElement);
      mount.removeChild(labelLayer);
    };
  }, [onPickPortfolio]);

  return (
    <section id="top" className="relative h-screen min-h-[720px] w-full overflow-hidden">
      <div ref={mountRef} className="absolute inset-0" />
      <div className="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-transparent to-navy-900" />

          </ul>
        </div>
      </div>
      <div className="max-w-6xl mx-auto mt-12 pt-6 border-t border-white/5 flex flex-col md:flex-row items-center justify-between text-white/40 text-xs">
        <p>© 2026 Made with 💙 by SARC</p>
        <p className="mt-3 md:mt-0 tracking-[0.3em] uppercase">Student Alumni Relations Cell</p>

}

/* ===================== APP ===================== */

function App() {
  const [drawer, setDrawer] = useState(null);
  const onJump = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  return (
    <>
      <Nav onJump={onJump} />
      <Hero onPickPortfolio={setDrawer} />
      <AboutSection />
      <EventsSection />
      <Carousel />
      <PortfolioSections onOpen={setDrawer} />
      <Footer onJump={onJump} />
      <PortfolioDrawer portfolio={drawer} onClose={() => setDrawer(null)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
